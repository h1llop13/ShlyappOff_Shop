<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Админка - Клиенты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin">Админка ShlyapOff</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/admin">Товары</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/categories">Категории</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/brands">Бренды</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/customers">Клиенты</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/loyalty">Лояльность</a></li>
                <li class="nav-item"><a class="nav-link" href="/">На сайт</a></li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="nav-link btn btn-link text-white-50 text-decoration-none p-0 border-0">Выйти</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="mb-4">Клиенты Mini App</h1>

    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th>Telegram</th>
            <th>Имя</th>
            <th>Сумма всех заказов</th>
            <th>Текущая скидка</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="customer : ${customers}">
            <td>
                <a th:if="${customer.telegramUsername}" th:href="'https://t.me/' + ${customer.telegramUsername}"
                   th:text="'@' + ${customer.telegramUsername}" target="_blank" class="link-light"></a>
                <span th:unless="${customer.telegramUsername}" th:text="'ID ' + ${customer.telegramUserId}"></span>
            </td>
            <td th:text="(${customer.firstName} ?: '') + ' ' + (${customer.lastName} ?: '')">Имя</td>
            <td th:text="${customer.totalSpent} + ' ₽'">0 ₽</td>
            <td>
                <span th:if="${customer.discountPercent} > 0" class="badge bg-success" th:text="${customer.discountPercent} + '%'"></span>
                <span th:if="${customer.discountPercent} == 0" class="text-white-50">—</span>
            </td>
        </tr>
        <tr th:if="${customers.isEmpty()}">
            <td colspan="4" class="text-white-50">Пока ни один клиент не оформил заказ через Mini App.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
