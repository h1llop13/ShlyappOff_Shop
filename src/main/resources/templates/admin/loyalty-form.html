<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Форма порога лояльности</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin">Админка ShlyapOff</a>
    </div>
</nav>

<div class="container mt-5">
    <h1 th:text="${tier.id != null ? 'Редактировать порог' : 'Добавить порог лояльности'}">Форма</h1>

    <form th:action="${tier.id != null ? '/admin/loyalty/edit/' + tier.id : '/admin/loyalty/create'}" method="post" style="max-width: 420px;">
        <div class="mb-3">
            <label for="minAmount" class="form-label">Сумма всех заказов, при которой даётся скидка (₽)</label>
            <input type="number" step="0.01" min="0" class="form-control bg-dark text-white" id="minAmount" name="minAmount"
                   th:value="${tier.minAmount}" required>
        </div>
        <div class="mb-3">
            <label for="discountPercent" class="form-label">Скидка (%)</label>
            <input type="number" step="1" min="1" max="100" class="form-control bg-dark text-white" id="discountPercent" name="discountPercent"
                   th:value="${tier.discountPercent}" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">Сохранить</button>
            <a href="/admin/loyalty" class="btn btn-outline-light">Отмена</a>
        </div>
    </form>
</div>

</body>
</html>
