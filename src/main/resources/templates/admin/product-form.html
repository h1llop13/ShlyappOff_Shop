<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id != null ? 'Редактировать товар' : 'Добавить товар'}">Форма товара</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin">Админка ShlyapOff</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">На сайт</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="mb-4" th:text="${product.id != null ? 'Редактировать товар' : 'Добавить товар'}">Форма</h1>

    <form th:action="${product.id != null ? '/admin/product/edit/' + product.id : '/admin/product/create'}"
          method="post"
          enctype="multipart/form-data">

        <div class="mb-3">
            <label for="name" class="form-label">Название товара</label>
            <input type="text" class="form-control bg-dark text-white" id="name" name="name"
                   th:value="${product.name}" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control bg-dark text-white" id="description" name="description" rows="3"
                      th:text="${product.description}"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="price" class="form-label">Цена (₽)</label>
                <input type="number" step="0.01" class="form-control bg-dark text-white" id="price" name="price"
                       th:value="${product.price}" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="category_id" class="form-label">Категория</label>
                <select class="form-select bg-dark text-white" id="category_id" name="category_id" required>
                    <option value="">Выберите категорию</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:attr="data-variant-type=${category.variantType},data-variant-title=${category.variantType.displayTitle},data-variant-singular=${category.variantType.singularAccusative},data-product-fields-template=${'product-fields-' + category.id}"
                            th:selected="${product.category != null && product.category.id == category.id}">
                    </option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="brand_id" class="form-label">Бренд</label>
                <select class="form-select bg-dark text-white" id="brand_id" name="brand_id" required>
                    <option value="">Выберите бренд</option>
                    <option th:each="brand : ${brands}"
                            th:value="${brand.id}"
                            th:text="${brand.name}"
                            th:selected="${product.brand != null && product.brand.id == brand.id}">
                    </option>
                </select>
            </div>

        </div>

        <div id="productFieldsContainer" class="row"></div>

        <template th:each="category : ${categories}"
                  th:id="${'product-fields-' + category.id}">
            <div th:each="field : ${fieldsByCategory[category.id]}" class="col-md-4 mb-3">
                <label th:for="${field.propertyName}" class="form-label" th:text="${field.displayName}">Характеристика</label>
                <input type="text" class="form-control bg-dark text-white"
                       th:id="${field.propertyName}"
                       th:name="${field.propertyName}"
                       th:value="${field.getValue(product)}"
                       th:placeholder="${field.placeholder}"
                       required>
            </div>
        </template>

        <section id="variantsSection" class="card bg-black mb-3" th:if="${product.id == null}" hidden>
            <div class="card-body">
                <h5 id="variantsTitle" class="mb-3">Варианты</h5>
                <div id="variantRows" class="d-grid gap-2"></div>
                <button type="button" id="addVariantButton" class="btn btn-outline-info mt-3">Добавить вариант</button>
            </div>
        </section>

        <div th:if="${product.id != null && product.category != null && product.category.variantType.name() != 'NONE'}" class="mb-3">
            <a th:href="@{/admin/product/{id}/variants(id=${product.id})}" class="btn btn-outline-info">Управлять вариантами товара</a>
        </div>

        <div class="mb-3">
            <label for="imageFile" class="form-label">Изображение товара</label>
            <input type="file" class="form-control bg-dark text-white" id="imageFile" name="imageFile" accept="image/*">
            <div th:if="${product.imageUrl != null}" class="mt-2">
                <small class="text-white-50">Текущее изображение:</small>
                <img th:src="${product.imageUrl}" alt="Текущее изображение" class="img-thumbnail mt-2" style="max-width: 200px;">
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning" th:text="${product.id != null ? 'Сохранить изменения' : 'Добавить товар'}">Сохранить</button>
            <a href="/admin" class="btn btn-outline-light">Отмена</a>
        </div>
    </form>
</div>

<script>
    const categorySelect = document.getElementById('category_id');
    const productFieldsContainer = document.getElementById('productFieldsContainer');
    const variantsSection = document.getElementById('variantsSection');
    const variantsTitle = document.getElementById('variantsTitle');
    const variantRows = document.getElementById('variantRows');
    const addVariantButton = document.getElementById('addVariantButton');

    function selectedVariantType() {
        return categorySelect.options[categorySelect.selectedIndex];
    }

    function updateProductFields() {
        const option = selectedVariantType();
        const templateId = option && option.dataset.productFieldsTemplate;
        const template = templateId && document.getElementById(templateId);
        productFieldsContainer.replaceChildren();

        if (template) {
            productFieldsContainer.appendChild(template.content.cloneNode(true));
        }
    }

    function addVariantRow() {
        const option = selectedVariantType();
        const singular = option.dataset.variantSingular || 'вариант';
        const row = document.createElement('div');
        row.className = 'input-group';
        row.innerHTML = `<input type="text" name="variantValues" class="form-control bg-dark text-white" placeholder="Укажите ${singular}" required>
                         <button type="button" class="btn btn-outline-danger">Удалить</button>`;
        row.querySelector('button').addEventListener('click', () => row.remove());
        variantRows.appendChild(row);
    }

    function updateVariantsSection() {
        const option = selectedVariantType();
        const hasVariants = option && option.dataset.variantType && option.dataset.variantType !== 'NONE';
        variantsSection.hidden = !hasVariants;
        if (!hasVariants) {
            variantRows.replaceChildren();
            return;
        }
        variantsTitle.textContent = option.dataset.variantTitle || 'Варианты';
        addVariantButton.textContent = `Добавить ${option.dataset.variantSingular || 'вариант'}`;
    }

    categorySelect.addEventListener('change', updateProductFields);
    updateProductFields();

    if (variantsSection) {
        categorySelect.addEventListener('change', updateVariantsSection);
        addVariantButton.addEventListener('click', addVariantRow);
        updateVariantsSection();
    }
</script>

</body>
</html>
