<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShlyapOff - Главная</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #888888);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --btn-bg: var(--text);
            --btn-text: var(--bg);
            --border: color-mix(in srgb, var(--text) 10%, transparent);
            --card-bg: color-mix(in srgb, var(--text) 5%, transparent);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* === HERO SECTION === */
        .hero {
            padding: 24px 16px;
            text-align: center;
            background: var(--secondary-bg);
            border-bottom: 1px solid var(--border);
        }
        .hero-greeting {
            font-size: 14px;
            color: var(--hint);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .hero-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        .hero-subtitle {
            font-size: 15px;
            color: var(--hint);
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .hero-btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }
        .hero-btn:active {
            transform: scale(0.98);
        }

        /* === CATEGORIES SCROLL === */
        .categories-section {
            padding: 24px 0 16px 0;
        }
        .section-header {
            padding: 0 16px 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
        }
        .section-link {
            font-size: 14px;
            color: var(--hint);
            text-decoration: none;
            font-weight: 500;
        }

        .categories-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 16px 16px 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            flex-shrink: 0;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            transition: var(--transition);
            white-space: nowrap;
        }
        .category-chip:active {
            background: var(--btn-bg);
            color: var(--btn-text);
        }

        /* === PRODUCTS GRID === */
        .products-section {
            padding: 0 16px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: var(--secondary-bg);
        }

        .product-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            margin-top: auto;
        }

        .product-actions {
            display: flex;
            gap: 6px;
        }

        .btn-details {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            transition: var(--transition);
        }

        .btn-cart {
            flex: 1;
            padding: 8px;
            background: var(--btn-bg);
            border: none;
            border-radius: 8px;
            color: var(--btn-text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--hint);
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* === BOTTOM NAVIGATION === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--hint);
            transition: var(--transition);
            padding: 8px 16px;
            border-radius: 12px;
        }
        .nav-item.active {
            color: var(--text);
            font-weight: 600;
        }
        .nav-icon {
            font-size: 24px;
        }
        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }

        /* === RESPONSIVE === */
        @media (min-width: 640px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-greeting" id="userGreeting">Добро пожаловать!</div>
    <h1 class="hero-title">ShlyapOff</h1>
    <p class="hero-subtitle">Лучший выбор вейп-продукции с доставкой</p>
    <a href="/catalog" class="hero-btn">Перейти в каталог</a>
</section>

<!-- CATEGORIES -->
<section class="categories-section">
    <div class="section-header">
        <h2 class="section-title">Категории</h2>
        <a href="/catalog" class="section-link">Все →</a>
    </div>
    <div class="categories-scroll">
        <a href="/catalog" class="category-chip">Все товары</a>
        <a href="/catalog?categoryId=1" class="category-chip">Одноразки</a>
        <a href="/catalog?categoryId=2" class="category-chip">Жидкости</a>
        <a href="/catalog?brandId=1" class="category-chip">HQD</a>
        <a href="/catalog?brandId=2" class="category-chip">ELFBAR</a>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products-section">
    <div class="section-header">
        <h2 class="section-title">Новинки</h2>
        <a href="/catalog" class="section-link">Все →</a>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(products)}" class="empty-state">
        <div class="empty-icon">📦</div>
        <h3>Товаров пока нет</h3>
        <p>Загляните позже!</p>
    </div>

    <!-- Products Grid -->
    <div th:if="${!#lists.isEmpty(products)}" class="products-grid">
        <div class="product-card" th:each="product : ${products}">
            <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" class="product-image" alt="Фото">
            <img th:if="${product.imageUrl == null}" src="https://via.placeholder.com/300x200?text=No+Image" class="product-image" alt="Нет фото">

            <div class="product-content">
                <h3 class="product-title" th:text="${product.name}">Название товара</h3>
                <div class="product-price" th:text="${product.price} + ' ₽'">0 ₽</div>

                <div class="product-actions">
                    <a th:href="@{/product/{id}(id=${product.id})}" class="btn-details">Подробнее</a>
                    <form th:action="@{/cart/add}" method="post" style="flex: 1;">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit" class="btn-cart">В корзину</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
    <a href="/" class="nav-item active">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Главная</span>
    </a>
    <a href="/catalog" class="nav-item">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Каталог</span>
    </a>
    <a href="/cart" class="nav-item">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Корзина</span>
    </a>
    <a href="/profile" class="nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Профиль</span>
    </a>
</nav>

<script>
    // === TELEGRAM WEBAPP ===
    if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Персонализация: показываем имя пользователя
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            const greeting = document.getElementById('userGreeting');
            if (greeting && user.first_name) {
                greeting.textContent = `Привет, ${user.first_name}! 👋`;
            }
        }
    }
</script>
</body>
</html>
