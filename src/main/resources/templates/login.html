<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админку - ShlyapOff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card bg-black text-white">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Вход в админку</h3>

                    <!-- Сообщение об ошибке, если логин/пароль неверные -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        Неверный логин или пароль
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Логин</label>
                            <input type="text" class="form-control bg-dark text-white" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control bg-dark text-white" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
