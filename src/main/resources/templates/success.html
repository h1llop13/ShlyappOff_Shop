<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заказ оформлен - ShlyapOff</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #888888);
            --success: #34c759;
            --btn-bg: var(--text);
            --btn-text: var(--bg);
            --border: color-mix(in srgb, var(--text) 10%, transparent);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: bounceIn 0.6s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--hint);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .order-number {
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 32px;
            display: inline-block;
        }

        .action-btn {
            padding: 16px 32px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }

        .action-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="success-icon">✅</div>
<h1>Заказ оформлен!</h1>
<p class="subtitle">
    Спасибо за покупку!<br>
    Мы свяжемся с вами в ближайшее время для подтверждения заказа.
</p>
<div class="order-number">
    Заказ #<span th:text="${orderId}">123</span>
</div>
<a href="/catalog" class="action-btn">Вернуться в каталог</a>

<script>
    if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.MainButton.hide();
    }
</script>
</body>
</html>
