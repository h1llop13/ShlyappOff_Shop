<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - ShlyapOff'">Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ShlyapOff</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin">Админ</a></li>
                <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
                <li class="nav-item">
                    <a class="nav-link" href="/cart">
                        🛒 Корзина
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <!-- Левая колонка: Картинка -->
        <div class="col-md-6">
            <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" class="img-fluid rounded" alt="Фото">
            <img th:if="${product.imageUrl == null}" src="https://via.placeholder.com/600x400?text=No+Image" class="img-fluid rounded" alt="Нет фото">
        </div>

        <!-- Правая колонка: Информация -->
        <div class="col-md-6">
            <h1 class="mb-3" th:text="${product.name}">Название товара</h1>
            <p class="text-white-50 mb-4" th:text="${product.description}">Описание товара...</p>

            <div class="mb-3">
                <span class="h3 text-warning" th:text="${product.price} + ' ₽'">0 ₽</span>
            </div>

            <!-- Блок с вкусами/вариантами -->
            <div th:if="${!product.variants.isEmpty()}" class="mb-4">
                <h5>Вкусы:</h5>
                <div class="row">
                    <div th:each="variant : ${product.variants}" class="col-md-6 mb-2">
                        <div class="d-flex align-items-center p-2 bg-black rounded">
                            <span th:if="${variant.inStock}" class="text-success me-2">✓</span>
                            <span th:if="${!variant.inStock}" class="text-danger me-2">✗</span>
                            <span th:text="${variant.flavorName}"
                                  th:classappend="${variant.inStock} ? 'text-white' : 'text-decoration-line-through text-white-50'">
                    Вкус
                </span>
                            <span th:if="${!variant.inStock}" class="ms-2 badge bg-secondary">Нет в наличии</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <p><strong>Крепость:</strong> <span th:text="${product.nicotineStrength}">Не указана</span></p>
                <p><strong>Объем:</strong> <span th:text="${product.volume}">Не указан</span></p>
                <p><strong>Категория:</strong> <span th:text="${product.category != null ? product.category.name : 'Без категории'}">-</span></p>
                <p><strong>Бренд:</strong> <span th:text="${product.brand != null ? product.brand.name : 'Неизвестен'}">-</span></p>
            </div>

            <form th:action="@{/cart/add}" method="post" class="d-inline">
                <input type="hidden" name="productId" th:value="${product.id}">
                <button type="submit" class="btn btn-warning btn-lg">В корзину</button>
            </form>
            <a href="/catalog" class="btn btn-outline-light btn-lg ms-2">Назад в каталог</a>
        </div>
    </div>
</div>

</body>
</html>
