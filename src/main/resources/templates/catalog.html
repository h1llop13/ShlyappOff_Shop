<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShlyapOff - Каталог</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ShlyapOff</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin">Админ</a></li>
                <li class="nav-item"><a class="nav-link active" href="/catalog">Каталог</a></li>
                <li class="nav-item">
                    <a class="nav-link" href="/cart">
                        🛒 Корзина
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="mb-4">Каталог товаров</h1>

    <!-- ФОРМА ПОИСКА И ФИЛЬТРАЦИИ -->
    <form method="get" action="/catalog" class="mb-4 p-3 bg-black rounded">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" name="search" class="form-control bg-dark text-white border-secondary"
                       placeholder="Поиск по названию..." th:value="${search}">
            </div>
            <div class="col-md-3">
                <select name="categoryId" class="form-select bg-dark text-white border-secondary">
                    <option value="">Все категории</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                            th:selected="${cat.id == categoryId}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <select name="brandId" class="form-select bg-dark text-white border-secondary">
                    <option value="">Все бренды</option>
                    <option th:each="br : ${brands}" th:value="${br.id}" th:text="${br.name}"
                            th:selected="${br.id == brandId}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-warning w-100">Найти</button>
            </div>
        </div>
    </form>

    <!-- СПИСОК ТОВАРОВ -->
    <div th:if="${#lists.isEmpty(products)}" class="alert alert-warning">
        По вашему запросу ничего не найдено.
    </div>

    <div class="row row-cols-1 row-cols-md-4 g-4"> <!-- Изменили на 4 колонки, чтобы 12 товаров смотрелись лучше -->
        <div class="col" th:each="product : ${products}">
            <div class="card bg-black text-white h-100">
                <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" class="card-img-top" alt="Фото">
                <img th:if="${product.imageUrl == null}" src="https://via.placeholder.com/300x200?text=No+Image" class="card-img-top" alt="Нет фото">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Название</h5>
                    <p class="card-text text-white-50" th:text="${product.description}">Описание</p>
                </div>
                <div class="card-footer bg-black border-0 d-flex justify-content-between align-items-center mt-auto">
                    <span class="h5 mb-0 text-warning" th:text="${product.price} + ' ₽'">0 ₽</span>
                    <div class="d-flex gap-2">
                    <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-outline-light">Подробнее</a>

                    <!--кнопка добавления в корзину -->
                    <form th:action="@{/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <button type="submit" class="btn btn-warning btn-sm">В корзину</button>
                    </form>
                </div>
                </div>
            </div>
        </div>
    </div>

    <!-- БЛОК ПАГИНАЦИИ -->
    <nav th:if="${totalPages > 1}" class="mt-5">
        <ul class="pagination justify-content-center">
            <!-- Кнопка Назад -->
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link bg-dark text-white border-secondary"
                   th:href="@{/catalog(page=${currentPage - 1}, search=${search}, categoryId=${categoryId}, brandId=${brandId})}">Назад</a>
            </li>

            <!-- Номера страниц -->
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link bg-dark text-white border-secondary"
                   th:href="@{/catalog(page=${i}, search=${search}, categoryId=${categoryId}, brandId=${brandId})}"
                   th:text="${i + 1}">1</a>
            </li>

            <!-- Кнопка Вперед -->
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link bg-dark text-white border-secondary"
                   th:href="@{/catalog(page=${currentPage + 1}, search=${search}, categoryId=${categoryId}, brandId=${brandId})}">Вперед</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
