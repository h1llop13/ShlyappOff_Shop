<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - ShlyapOff</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ShlyapOff</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
                <li class="nav-item"><a class="nav-link active" href="/cart">Корзина</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="mb-4">Ваша корзина</h1>

    <div th:if="${cart == null || #lists.isEmpty(cart.items)}" class="alert alert-warning">
        Корзина пуста. <a href="/catalog" class="alert-link">Перейти в каталог</a>
    </div>

    <div th:if="${cart != null && !#lists.isEmpty(cart.items)}">
        <table class="table table-dark table-striped align-middle">
            <thead>
            <tr>
                <th>Товар</th>
                <th>Цена</th>
                <th>Количество</th>
                <th>Итого</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td>
                    <div class="d-flex align-items-center">
                        <img th:if="${item.product.imageUrl != null}" th:src="${item.product.imageUrl}" style="width: 50px; height: 50px; object-fit: cover;" class="me-3 rounded">
                        <span th:text="${item.product.name}">Название</span>
                    </div>
                </td>
                <td th:text="${item.product.price} + ' ₽'">0 ₽</td>
                <td>
                    <form th:action="@{/cart/update}" method="post" class="d-flex align-items-center gap-2">
                        <input type="hidden" name="productId" th:value="${item.product.id}">
                        <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="btn btn-sm btn-outline-light" th:disabled="${item.quantity <= 1}">-</button>
                        <span th:text="${item.quantity}">1</span>
                        <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="btn btn-sm btn-outline-light">+</button>
                    </form>
                </td>
                <td th:text="${item.product.price.doubleValue() * item.quantity} + ' ₽'">0 ₽</td>
                <td>
                    <form th:action="@{/cart/remove}" method="post">
                        <input type="hidden" name="productId" th:value="${item.product.id}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center mt-4 p-3 bg-black rounded">
            <h3>Итого: <span class="text-warning" th:text="${total} + ' ₽'">0 ₽</span></h3>
            <div class="d-flex gap-2">
                <form th:action="@{/cart/clear}" method="post">
                    <button type="submit" class="btn btn-outline-secondary">Очистить</button>
                </form>
                <a href="#" class="btn btn-warning">Оформить заказ</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
