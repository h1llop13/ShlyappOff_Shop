spring:
  application:
    name: ShlyapOff

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shlyapoff_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  threads:
    virtual:
      enabled: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:}

# ВАЖНО: секция telegram на КОРНЕВОМ уровне (без отступов слева)!
telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  admin-chat-id: ${TELEGRAM_ADMIN_CHAT_ID}